# IMPORTANT: This repo must be configured to use "GitHub Actions" as the
# Pages source (Settings → Pages → Build and deployment → Source).
# If set to "Deploy from a branch", GitHub's built-in pages-build-deployment
# workflow will deploy the raw source (index.html referencing /src/main.ts)
# whenever this custom workflow fails, breaking the live site.
# This workflow cancels those competing runs as a safety net,
# but the proper fix is the Pages source setting.

name: Deploy static content to Pages

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cancel competing pages-build-deployment runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --workflow=pages-build-deployment --status=in_progress --limit 10 --json databaseId -q '.[].databaseId' 2>/dev/null || echo '')
          if [ -n "$runs" ]; then
            for id in $runs; do
              gh run cancel "$id" 2>/dev/null || true
            done
          fi

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check Prettier
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Validate Pages artifact
        run: npm run check:pages-artifact

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './dist'

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy3.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Cancel lingering pages-build-deployment runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --workflow=pages-build-deployment --status=in_progress --limit 10 --json databaseId -q '.[].databaseId' 2>/dev/null || echo '')
          if [ -n "$runs" ]; then
            for id in $runs; do
              gh run cancel "$id" 2>/dev/null || true
            done
            sleep 10
          fi

      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait and cancel competing runs (before retry 1)
        if: steps.deploy.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sleep 30
          runs=$(gh run list --workflow=pages-build-deployment --status=in_progress --limit 10 --json databaseId -q '.[].databaseId' 2>/dev/null || echo '')
          if [ -n "$runs" ]; then
            for id in $runs; do
              gh run cancel "$id" 2>/dev/null || true
            done
          fi

      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy2
        if: steps.deploy.outcome == 'failure'
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait and cancel competing runs (before retry 2)
        if: steps.deploy.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 60

      - name: Deploy to GitHub Pages (attempt 3)
        id: deploy3
        if: steps.deploy.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v5

      - name: Smoke test live Pages site
        if: steps.deploy.outcome == 'success' || steps.deploy2.outcome == 'success' || steps.deploy3.outcome == 'success'
        run: |
          PAGE_URL="${{ steps.deploy.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy3.outputs.page_url }}"
          node scripts/check-pages-deployment.mjs "${PAGE_URL:-https://drodriguez-apps.github.io}"
