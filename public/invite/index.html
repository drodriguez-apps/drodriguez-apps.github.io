<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="0; url=/tandapp/invite/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Redireccionando invitación | Tandapp</title>
    <script>
      ;(function redirectInvite() {
        var url = new URL(window.location.href)

        function normalizeCode(rawValue) {
          return (rawValue || '')
            .trim()
            .toUpperCase()
            .replace(/[^A-Z0-9]/g, '')
        }

        function readInviteCode() {
          var directCode = normalizeCode(
            url.searchParams.get('code') || url.searchParams.get('inviteCode'),
          )
          if (directCode) {
            return directCode
          }

          var segments = url.pathname.split('/').filter(Boolean)
          var routeOffset = segments[0] === 'tandaap' || segments[0] === 'tandapp' ? 1 : 0
          if (
            segments.length > routeOffset + 1 &&
            (segments[routeOffset] === 'join' || segments[routeOffset] === 'invite')
          ) {
            return normalizeCode(segments[routeOffset + 1])
          }

          return ''
        }

        var inviteCode = readInviteCode()
        var target =
          '/tandapp/invite/' + (inviteCode ? '?code=' + encodeURIComponent(inviteCode) : '')
        window.location.replace(target + window.location.hash)
      })()
    </script>
  </head>

  <body></body>
</html>
