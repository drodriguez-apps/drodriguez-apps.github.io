<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page not found | Drodriguez Apps</title>
    <style>
      :root {
        color-scheme: light;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(180deg, #f4efe5 0%, #ecf6f3 100%);
        color: #13261e;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        padding: 24px;
      }

      main {
        max-width: 560px;
        border: 1px solid rgba(19, 38, 30, 0.12);
        border-radius: 24px;
        background: rgba(255, 250, 241, 0.88);
        box-shadow: 0 20px 60px rgba(19, 38, 30, 0.12);
        padding: 32px;
      }

      a {
        color: #0f6b63;
        font-weight: 700;
      }
    </style>
    <script>
      ;(function redirectInvitePath() {
        var path = window.location.pathname || '/'
        var normalizedPath = path.replace(/\/+$/, '')

        function normalizeCode(rawValue) {
          return (rawValue || '')
            .trim()
            .toUpperCase()
            .replace(/[^A-Z0-9]/g, '')
        }

        function redirectToInvite(parts, codeIndex) {
          var inviteCode = parts.length > codeIndex ? normalizeCode(parts[codeIndex]) : ''
          var target =
            '/tandapp/invite/' + (inviteCode ? '?code=' + encodeURIComponent(inviteCode) : '')
          window.location.replace(target + window.location.hash)
        }

        if (normalizedPath.indexOf('/tandapp/invite/') === 0) {
          redirectToInvite(normalizedPath.split('/').filter(Boolean), 2)
          return
        }

        if (normalizedPath.indexOf('/invite/') === 0) {
          redirectToInvite(normalizedPath.split('/').filter(Boolean), 1)
          return
        }

        if (normalizedPath.indexOf('/join/') === 0) {
          redirectToInvite(normalizedPath.split('/').filter(Boolean), 1)
          return
        }

        if (normalizedPath.indexOf('/tandaap/join/') === 0) {
          redirectToInvite(normalizedPath.split('/').filter(Boolean), 2)
          return
        }
      })()
    </script>
  </head>

  <body>
    <main>
      <p>Drodriguez Apps</p>
      <h1>Page not found</h1>
      <p>The page you tried to open is not available. Return to the portfolio home page.</p>
      <p><a href="/">Go back home</a></p>
    </main>
  </body>
</html>
